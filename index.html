<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWIS Rocket League Tournament</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05080a;
            --card-bg: rgba(255, 255, 255, 0.02);
            --accent: #00e5ff;
            --text-head: 'Orbitron', sans-serif;
            --text-body: 'Inter', sans-serif;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg);
            color: #e0e6ed;
            font-family: var(--text-body);
            margin: 0;
            line-height: 1.6;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #001a33 0%, #05080a 100%);
            border-bottom: 1px solid var(--border);
        }

        h1 { font-family: var(--text-head); font-size: 2.5rem; margin: 0; color: #fff; text-shadow: 0 0 20px rgba(0,229,255,0.4); }
        h2 { font-family: var(--text-head); font-size: 1.1rem; color: var(--accent); margin: 40px 0 20px; text-align: center; letter-spacing: 3px; text-transform: uppercase; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        .matchup-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .matchup-card {
            background: linear-gradient(145deg, #0a1116, #05080a);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            transition: 0.3s;
            cursor: pointer;
        }
        .matchup-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); }
        .match-label { font-size: 0.6rem; color: #444; position: absolute; top: 10px; right: 15px; font-family: var(--text-head); }

        .team-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            font-weight: 700;
            font-family: var(--text-head);
            font-size: 0.85rem;
        }
        .vs-divider {
            height: 1px;
            background: var(--border);
            margin: 5px 0;
            position: relative;
        }
        .vs-divider::after {
            content: "VS";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: #081015;
            padding: 0 10px;
            font-size: 0.65rem;
            color: var(--accent);
            font-family: var(--text-head);
        }

        .stats-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }
        .stat-column {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
        }
        .stat-column h3 {
            font-family: var(--text-head);
            font-size: 0.75rem;
            color: var(--accent);
            text-align: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .stat-leader-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .stat-val { font-weight: bold; color: var(--accent); font-family: var(--text-head); }

        .teams-table-wrapper { background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; overflow: hidden; margin-bottom: 50px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.03); padding: 15px; text-align: left; font-size: 0.7rem; color: #555; text-transform: uppercase; }
        td { padding: 15px; border-top: 1px solid var(--border); font-size: 0.9rem; }
        .team-id-tag { color: var(--accent); font-family: var(--text-head); font-weight: bold; width: 80px; }
        .rank-pill { font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; background: rgba(0,229,255,0.05); color: var(--accent); border: 1px solid rgba(0,229,255,0.1); margin-left: 8px; font-weight: bold; }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #0a1116;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            max-width: 600px;
            width: 90%;
            position: relative;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 1.5rem; color: var(--accent); }
        .stat-table th { color: var(--accent); text-align: center; }
        .stat-table td { text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>NWIS Rocket League TOURNAMENT</h1>
    <p style="color: #444; letter-spacing: 5px; font-size: 0.8rem; margin-top: 10px;">PRO SERIES: ROUND OF 16</p>
</header>

<div class="container">
    <h2>Championship Bracket</h2>
    <p style="text-align: center; color: #666; font-size: 0.75rem; margin-top: -15px; margin-bottom: 30px;">Click any bracket to view full player statistics</p>
    <div class="matchup-grid" id="bracket-grid"></div>

    <h2>Individual Leaderboards</h2>
    <div class="stats-dashboard" id="leaderboard">
        <div class="stat-column"><h3>TOP SCORERS</h3><div id="goals-list"></div></div>
        <div class="stat-column"><h3>TOP ASSISTS</h3><div id="assists-list"></div></div>
        <div class="stat-column"><h3>TOP SAVES</h3><div id="saves-list"></div></div>
        <div class="stat-column"><h3>TOP DEMOS</h3><div id="demos-list"></div></div>
    </div>

    <h2>Team Information & Rosters</h2>
    <div class="teams-table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Team Roster</th>
                </tr>
            </thead>
            <tbody id="roster-list"></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="statModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" style="margin-top:0; font-size: 1rem; letter-spacing: 2px; text-align: center;">MATCH STATISTICS</h2>
        <div style="overflow-x: auto;">
            <table class="stat-table">
                <thead>
                    <tr>
                        <th style="text-align: left;">PLAYER</th>
                        <th>GOALS</th>
                        <th>ASSISTS</th>
                        <th>SAVES</th>
                        <th>DEMOS</th>
                    </tr>
                </thead>
                <tbody id="statBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. TEAM INFORMATION (Locked matchups and Expanded Ranks)
    const teams = [
        { id: 12, p1: "Qamar", r1: "Platinum", p2: "Yahia Saeed", r2: "Gold" },
        { id: 7, p1: "Mujtaba Umer", r1: "Diamond I", p2: "Mohammed Samer", r2: "Bronze III" },
        
        { id: 9, p1: "Ahmad Ziyad", r1: "Platinum III", p2: "Saif Yazan", r2: "Silver I" },
        { id: 15, p1: "Ammar Mirza", r1: "Gold II", p2: "Ali Al Bachari", r2: "Gold I" },
        
        { id: 5, p1: "Rafay", r1: "Champion I", p2: "Syed Umer", r2: "Bronze I" },
        { id: 4, p1: "Obada", r1: "Champion I", p2: "Younes Hassan", r2: "Unranked" },
        
        { id: 8, p1: "Omeir", r1: "Platinum III", p2: "Modasser Sameh", r2: "Silver" },
        { id: 1, p1: "Ali Al Amoudi", r1: "Grand Champion III", p2: "Moath Birier", r2: "Unranked" },
        
        { id: 6, p1: "Mahmoud Mousa", r1: "Diamond I", p2: "Ahmed Firdawi", r2: "Bronze I" },
        { id: 10, p1: "Ahmed Gomah", r1: "Platinum II", p2: "Basel Mahmoud", r2: "Silver III" },
        
        { id: 13, p1: "Anas Mohammad", r1: "Gold III", p2: "Khaled Al Shummari", r2: "Gold" },
        { id: 3, p1: "Osama Amjad", r1: "Champion II", p2: "Ramez Al Issa", r2: "Unranked" },
        
        { id: 14, p1: "Hamza", r1: "Gold II", p2: "Ammar Mustafa", r2: "Gold I" },
        { id: 2, p1: "Zainuddin", r1: "Grand Champion", p2: "Shahryar", r2: "Unranked" },
        
        { id: 16, p1: "Hamza Mostafa", r1: "Gold II", p2: "Ahmad Tabiyyeh", r2: "Gold II" },
        { id: 11, p1: "Zain Musab", r1: "Platinum", p2: "Anwar Bechara", r2: "Silver III" }
    ];

    const matchStats = { "Ali Al Amoudi": [0, 0, 0, 0] };

    function updateLeaderboard() {
        const categories = { goals: 0, assists: 1, saves: 2, demos: 3 };
        const ids = ['goals-list', 'assists-list', 'saves-list', 'demos-list'];
        
        Object.keys(categories).forEach((cat, index) => {
            const listElement = document.getElementById(ids[index]);
            const sorted = Object.entries(matchStats)
                .filter(p => p[1][categories[cat]] > 0)
                .sort((a, b) => b[1][categories[cat]] - a[1][categories[cat]])
                .slice(0, 5);
            
            if (sorted.length === 0) {
                listElement.innerHTML = `<div style="color:#333; font-size:0.7rem; text-align:center;">Waiting for data...</div>`;
            } else {
                listElement.innerHTML = sorted.map(player => `
                    <div class="stat-leader-row">
                        <span>${player[0]}</span>
                        <span class="stat-val">${player[1][categories[cat]]}</span>
                    </div>
                `).join('');
            }
        });
    }

    // Modal UI Fix
    function openModal(t1, t2) {
        document.getElementById('modalTitle').innerText = `TEAM ${t1.id} vs TEAM ${t2.id}`;
        const body = document.getElementById('statBody');
        const matchPlayers = [{n: t1.p1, r: t1.r1}, {n: t1.p2, r: t1.r2}, {n: t2.p1, r: t2.r1}, {n: t2.p2, r: t2.r2}];
        body.innerHTML = matchPlayers.map(p => {
            const s = matchStats[p.n] || [0, 0, 0, 0];
            return `<tr><td style="text-align:left; padding:12px;"><b>${p.n}</b><br><small style="color:var(--accent)">${p.r}</small></td><td>${s[0]}</td><td>${s[1]}</td><td>${s[2]}</td><td>${s[3]}</td></tr>`;
        }).join('');
        document.getElementById('statModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('statModal').style.display = 'none'; }

    const rosterList = document.getElementById('roster-list');
    [...teams].sort((a,b) => a.id - b.id).forEach(t => {
        rosterList.innerHTML += `<tr><td class="team-id-tag">T-${t.id}</td><td><div style="display:flex; justify-content:space-between; margin-bottom:5px;">${t.p1} <span class="rank-pill">${t.r1}</span></div><div style="display:flex; justify-content:space-between;">${t.p2} <span class="rank-pill">${t.r2}</span></div></td></tr>`;
    });

    // Generate Bracket - Shuffling Removed
    const grid = document.getElementById('bracket-grid');
    for (let i = 0; i < teams.length; i += 2) {
        const teamA = teams[i]; const teamB = teams[i+1];
        const card = document.createElement('div');
        card.className = 'matchup-card';
        card.onclick = () => openModal(teamA, teamB);
        card.innerHTML = `<span class="match-label">Round of 16</span><div class="team-entry">Team ${teamA.id} <span>0</span></div><div class="vs-divider"></div><div class="team-entry">Team ${teamB.id} <span>0</span></div>`;
        grid.appendChild(card);
    }

    updateLeaderboard();
</script>
</body>
</html>
